<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title">
  <title id="title">rtp2httpd icon</title>
  <defs>
    <linearGradient id="panelColor" x1="8" y1="5" x2="121" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9c80f7"/>
      <stop offset="0.34" stop-color="#825feb"/>
      <stop offset="0.7" stop-color="#6845df"/>
      <stop offset="1" stop-color="#4c2bc5"/>
    </linearGradient>

    <radialGradient id="ambientLight" cx="0" cy="0" r="1" gradientTransform="translate(17 11) rotate(42) scale(105)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.44"/>
      <stop offset="0.24" stop-color="#e9e0ff" stop-opacity="0.16"/>
      <stop offset="0.62" stop-color="#b49df9" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#7a55e6" stop-opacity="0"/>
