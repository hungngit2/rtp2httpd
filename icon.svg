    <g clip-path="url(#panelClip)">
      <rect width="128" height="128" fill="url(#ambientLight)"/>
      <rect width="128" height="128" fill="url(#deepTint)"/>
      <rect x="2" y="2" width="124" height="124" rx="25" fill="url(#glassWash)"/>

      <ellipse cx="23" cy="6" rx="38" ry="17" fill="#fff" opacity="0.16" filter="url(#blurredLight)"/>
      <ellipse cx="112" cy="116" rx="32" ry="22" fill="#9173f6" opacity="0.13" filter="url(#blurredLight)"/>

    </g>

    <rect x="0.75" y="0.75" width="126.5" height="126.5" rx="26.25" fill="none" stroke="url(#rimLight)" stroke-width="1.25"/>
  </g>

  <g transform="translate(2 0) translate(64 64) skewX(-6) translate(-64 -64)">
    <g filter="url(#glyphDepth)">
