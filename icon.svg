      <path d="M74 36.8c11 6.7 23 14.5 34.1 22.9 3.1 2.1 3.1 6.4-0.1 8.5-10.6 7.2-21.5 14.9-32.8 23-2.8 2-6.5 0.1-6.6-3.3l-1.3-47.7c-0.1-3.4 3.7-5.3 6.7-3.4Z" fill="url(#glyphGlass)" stroke="#fff" stroke-opacity="0.82" stroke-width="1.4"/>
    </g>

    <g fill="none" stroke="#fff" stroke-linecap="round" opacity="0.18">
      <path d="M18 41h30" stroke-width="0.8"/>
      <path d="M18 63h30" stroke-width="0.8"/>
      <path d="M18 85h30" stroke-width="0.8"/>
      <path d="M68.9 40.5l1.2 46.8" stroke-width="0.9"/>
