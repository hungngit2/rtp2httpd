    <filter id="panelDepth" x="-12" y="-12" width="152" height="154" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#261063" flood-opacity="0.28"/>
    </filter>

    <filter id="blurredLight" x="-30%" y="-50%" width="160%" height="200%">
