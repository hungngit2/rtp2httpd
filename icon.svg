      <stop offset="0.66" stop-color="#4f2cc8" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#6642db" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassWash" x1="26" y1="2" x2="91" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.13"/>
      <stop offset="0.42" stop-color="#fff" stop-opacity="0.025"/>
      <stop offset="0.7" stop-color="#c6b2ff" stop-opacity="0.045"/>
      <stop offset="1" stop-color="#8b6bf0" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="rimLight" x1="14" y1="4" x2="113" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.68"/>
      <stop offset="0.22" stop-color="#f0eaff" stop-opacity="0.3"/>
      <stop offset="0.55" stop-color="#a78df3" stop-opacity="0.08"/>
      <stop offset="0.82" stop-color="#4a28be" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#d8caff" stop-opacity="0.34"/>
    </linearGradient>

    <linearGradient id="glyphGlass" x1="31" y1="35" x2="86" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.98"/>
      <stop offset="0.52" stop-color="#fbf9ff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#eae4f9" stop-opacity="0.94"/>
